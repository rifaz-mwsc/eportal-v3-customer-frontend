name: Deploy to Dev Server

on:
  push:
    branches: ["develop"]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: self-hosted  # Use self-hosted runner in office network
    defaults:
      run:
        shell: powershell
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular App (dev-01 configuration)
        run: npm run build -- --configuration=dev-01

      - name: Deploy to Dev Server via Network Share
        run: |
          $serverPath = "${{ secrets.DEV_SERVER_PATH }}"
          $buildPath = ".\dist\Matdash\browser\*"
          
          Write-Host "Starting deployment..."
          Write-Host "Source: $buildPath"
          Write-Host "Destination: $serverPath"
          
          # Check if server path is accessible
          if (-not (Test-Path $serverPath)) {
            Write-Error "Cannot access server path: $serverPath"
            exit 1
          }
          
          # Clear destination folder
          Write-Host "Clearing destination..."
          Get-ChildItem -Path $serverPath | Remove-Item -Recurse -Force
          
          # Copy new files
          Write-Host "Copying new files..."
          Copy-Item -Path $buildPath -Destination $serverPath -Recurse -Force
          
          Write-Host "Deployment completed successfully!"
          
      - name: Deployment Summary
        run: |
          Write-Host "Deployment completed successfully!"
          Write-Host "Target: dev-01 environment"
          Write-Host "Server Path: ${{ secrets.DEV_SERVER_PATH }}"
