<div class="profile-content">
  <div class="row">
    <div class="col-lg-4">
      <mat-card class="cardWithShadow shadow-none b-1">
        <mat-card-content>
          <h5 class="f-s-21 f-w-600 m-b-16">Introduction</h5>
          @if (userData) {
            <p class="f-s-14 m-b-16 m-t-0">
              Hello, {{ userFullName }}.
              @if (userData.isVerified) {
                <span class="badge bg-success-subtle text-success">Verified</span>
              }
            </p>
          } @else {
            <p class="f-s-14 m-b-16 m-t-0">
              Not Available
            </p>
          }
          <div class="d-flex align-items-center gap-16 m-b-24">
            <i-tabler name="id" class="icon-20"></i-tabler>
            <h6 class="f-s-16 f-w-600">{{ userIdNumber }}</h6>
          </div>
          <div class="d-flex align-items-center gap-16 m-b-24">
            <i-tabler name="mail" class="icon-20"></i-tabler>
            <h6 class="f-s-16 f-w-600">{{ userEmail }}</h6>
          </div>
          <div class="d-flex align-items-center gap-16 m-b-24">
            <i-tabler name="phone" class="icon-20"></i-tabler>
            <h6 class="f-s-16 f-w-600">{{ userPhone }}</h6>
          </div>
          <div class="d-flex align-items-center gap-16 m-b-24">
            <i-tabler name="user" class="icon-20"></i-tabler>
            <h6 class="f-s-16 f-w-600">{{ userGender }}</h6>
          </div>
          <div class="d-flex align-items-center gap-16">
            <i-tabler name="map-pin" class="icon-20"></i-tabler>
            <h6 class="f-s-16 f-w-600">{{ userNationality }}</h6>
          </div>
        </mat-card-content>
      </mat-card>
