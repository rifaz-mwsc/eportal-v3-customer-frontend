<mat-card class="cardWithShadow">
  <mat-card-content>
    <div class="row justify-content-between gap-12">
      <div class="col-lg-4">
        <mat-form-field appearance="outline" class="w-100 hide-hint">
          <mat-label>Search</mat-label>
          <input matInput (keyup)="applyFilter($event)" />
          <mat-icon matSuffix>
            <i-tabler name="search" class="icon-20 d-flex m-t-2"></i-tabler>
          </mat-icon>
        </mat-form-field>
      </div>
      <div class="col-lg-3">
        <mat-form-field appearance="outline" class="w-100 hide-hint">
          <mat-label>Category</mat-label>
          <mat-select
            required
            [value]="selectedCategory()"
            (selectionChange)="ddlChange($event)">
            
            <mat-option value="All" selected>All</mat-option>
            <mat-option value="Water Supply">Water Supply</mat-option>
            <mat-option value="Billing">Billing</mat-option>
            <mat-option value="Maintenance">Maintenance</mat-option>
            <mat-option value="Account">Account</mat-option>
            <mat-option value="Support">Support</mat-option>
            <mat-option value="Reports">Reports</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>
  </mat-card-content>
</mat-card>

  <div class="setup-process p-b-48">
    <div class="container">
      
      <mat-card class="mat-bg-error mat-text-on-error">
        <mat-card-content>
          <span class="m-0 f-s-14 f-w-500 text-white">for Ibbe - must know if existing or new or LMS application</span>
        </mat-card-content>
      </mat-card>
      <div class="row">
        @for(service of serviceList(); track service.serviceName) {
        <div class="col-lg-3 col-sm-6" [routerLink]="['/apps/ServiceDirectory/ServiceDirectoryDetail/', service.Id]" style="cursor: pointer;">
          <mat-card class="" [ngStyle]="{
              'background-color': service.bg_color.startsWith('--')
                ? 'var(' + service.bg_color + ')'
                : service.bg_color
            }" [ngClass]="
              !service.bg_color.startsWith('--') ? 'bg-light-' + service.bg_color : ''
            ">
            <mat-card-content>
              <mat-card class="d-flex align-items-center justify-content-center icon-48 m-b-16">
                <i-tabler [name]="service.icon" class="icon-24" [ngClass]="service.color"></i-tabler>
              </mat-card>
              <h4 class="f-s-22 m-b-16 f-w-600 lh-normal">{{ service.serviceName }}</h4>
              <p class="f-s-14 m-y-0">{{ service.description }}</p>
            </mat-card-content>
          </mat-card>
        </div>
        }
      </div>
    </div>
  </div>
