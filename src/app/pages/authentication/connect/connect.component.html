<div class="connect-container">
  <div class="connect-content">
    <div *ngIf="loading" class="loading-state">
      <div class="spinner"></div>
      <h2>Connecting to ePortal...</h2>
      <p>Please wait while we authenticate your session.</p>
    </div>

    <div *ngIf="!loading && error" class="error-state">
      <div class="error-icon">⚠️</div>
      <h2>Authentication Error</h2>
      <p class="error-message">{{ error }}</p>
      <div *ngIf="errorDetails.length > 0" class="error-details">
        <ul>
          <li *ngFor="let detail of errorDetails">{{ detail }}</li>
        </ul>
      </div>
      <p class="redirect-message">Redirecting to login page in 5 seconds...</p>
    </div>

    <div *ngIf="!loading && !error" class="success-state">
      <div class="success-icon">✓</div>
      <h2>Authentication Successful</h2>
      <p>Redirecting to dashboard...</p>
    </div>
  </div>
</div>
