<mat-card class="cardWithShadow">
  <mat-card-content class="p-y-24">
    <div class="d-flex align-items-center justify-content-between m-b-16">
      <mat-card-title class="m-0">Recent Activity</mat-card-title>
      <a mat-button color="primary" [routerLink]="['/apps/my-applications/list']" class="f-s-13">
        View All
      </a>
    </div>

    <div class="timeline m-t-24">
      @for(activity of activities; track activity.time) {
      <div class="timeline-item d-flex overflow-hidden ">
        <div class="time text-right f-s-14">{{ activity.time }}</div>
        <div class="point d-flex align-items-center">
          <span class="timeline-badge border-{{ activity.color }} m-y-8"></span>
          <span class="timline-border d-block"></span>
        </div>
        <div class="desc f-s-14">
          @if(activity.subtext) {
          <span class="lh-20">{{ activity.subtext }}</span>
          }
          @if(activity.title) {
          <span class="lh-20 f-w-600 d-block">{{ activity.title }}</span>
          }
          <!-- @if(activity.link) {
          <a [routerLink]="['/apps/my-applications/list']" class="text-primary f-s-10 text-decoration-none">{{ activity.link }}</a>
          } -->
        </div>
      </div>
      }
    </div>

    <!-- Empty State -->
    @if(activities.length === 0) {
    <div class="text-center p-y-32">
      <i-tabler name="file-x" class="icon-48 text-muted opacity-50"></i-tabler>
      <p class="m-t-16 f-s-14 text-muted">No recent activity</p>
      <button mat-flat-button color="primary" [routerLink]="['/apps/ServiceDirectory']" class="m-t-8">
        <i-tabler name="plus" class="icon-18 m-r-4"></i-tabler>
        Submit New Application
      </button>
    </div>
    }

  </mat-card-content>
</mat-card>
